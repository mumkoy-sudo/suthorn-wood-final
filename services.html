<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>บริการของเรา | SUTHORN TIMBER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=Bai+Jamjuree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        suthorn: { DEFAULT: '#1b4332', dark: '#064e3b', light: '#bbf7d0', },
                        wood: { DEFAULT: '#8b4513', dark: '#5c2e0e', light: '#d2b48c', },
                        paper: { DEFAULT: '#f4f1ea', white: '#ffffff', }
                    }
                }
            }
        }
    </script>
</head>
<body class="text-gray-800 antialiased bg-paper">
    
    <!-- HEADER INJECTED -->
    <div id="header-container"></div>

    <section class="relative pt-16 md:pt-24 pb-20 bg-suthorn">
        <div class="absolute inset-0 bg-cover bg-center opacity-30 mix-blend-overlay" style="background-image: url('warehouse_inside.jpg');"></div>
        <div class="max-w-7xl mx-auto px-4 relative z-10 text-center">
            <h1 class="text-5xl font-bold text-white nav-font mb-4">บริการของเรา</h1>
            <div class="w-16 h-1 bg-wood mx-auto mb-6"></div>
            <p class="text-gray-300 text-lg max-w-2xl mx-auto">ทางเลือกที่ครบวงจรสำหรับทุกความต้องการเรื่องงานไม้อุตสาหกรรม</p>
        </div>
    </section>

    <!-- FOOTER INJECTED -->
    <div id="footer-container"></div>

    <script src="inline.js"></script>
</body>
</html>
