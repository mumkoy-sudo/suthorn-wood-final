<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ผลงานของเรา | SUTHORN TIMBER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=Bai+Jamjuree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        suthorn: { DEFAULT: '#1b4332', dark: '#064e3b', light: '#bbf7d0', },
                        wood: { DEFAULT: '#8b4513', dark: '#5c2e0e', light: '#d2b48c', },
                        paper: { DEFAULT: '#f4f1ea', white: '#ffffff', }
                    }
                }
            }
        }
    </script>
</head>
<body class="text-gray-800 antialiased bg-paper">
    
    <!-- HEADER INJECTED -->
    <div id="header-container"></div>

    <div class="max-w-7xl mx-auto px-4 pt-16 md:pt-24 pb-16">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-bold text-suthorn nav-font mb-4">ผลงานของเรา</h1>
            <div class="w-24 h-1 bg-wood mx-auto mb-6"></div>
            <p class="text-gray-600 text-lg">จากไม้ซุงคุณภาพสูง สู่ผลงานที่เราภาคภูมิใจ</p>
        </div>

        <!-- Yacht Series (New Masonry/Asymmetric Layout) -->
        <h2 class="text-3xl font-bold text-gray-900 nav-font mb-8 border-l-4 border-wood pl-4">Maritime & Luxury Yachts</h2>
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6 mb-20">
            <!-- 1. Large Main Image (Landscape) -->
            <div class="md:col-span-8">
                <div class="rounded-xl shadow-lg overflow-hidden h-[300px] md:h-[450px]">
                    <img src="1776913047013_1---6b677658-0eb8-4bae-bb87-f51c065fb365.png" class="w-full h-full object-cover" alt="Classic Wooden Schooner">
                </div>
            </div>
            
            <!-- 2. The Red-Cycled Image (Now in a VERTICAL container) -->
            <div class="md:col-span-4 md:row-span-2">
                <div class="rounded-xl shadow-lg overflow-hidden h-full min-h-[400px] bg-white border border-gray-100">
                    <!-- This container matches the image's vertical aspect ratio -->
                    <img src="1776913047011_1---5378e605-5044-451f-af98-309655009c16.png" class="w-full h-full object-cover" alt="Interior Detail Vertical">
                </div>
            </div>

            <!-- 3. Bottom Landscape Image -->
            <div class="md:col-span-8">
                <div class="rounded-xl shadow-lg overflow-hidden h-[300px] md:h-[450px]">
                    <img src="1776913001352_1---2b70bc8d-148b-4095-87d0-c540253b2829.jpg" class="w-full h-full object-cover" alt="Deck Woodwork">
                </div>
            </div>
        </div>

        <!-- Heavy Duty Construction -->
        <h2 class="text-3xl font-bold text-gray-900 nav-font mb-8 border-l-4 border-wood pl-4">Industrial & Boat Building</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-20">
            <div class="rounded-xl shadow-lg overflow-hidden h-72">
                <img src="1776913044438_1---7c86ef0a-cfff-4257-8981-571b1ce7fb9b.png" class="w-full h-full object-cover">
            </div>
            <div class="rounded-xl shadow-lg overflow-hidden h-72">
                <img src="1776913042824_1---7a28586d-1902-40f1-93d1-d9d5090c3c5f.png" class="w-full h-full object-cover">
            </div>
            <div class="rounded-xl shadow-lg overflow-hidden h-72">
                <img src="1776913046413_1---986c26bb-e67c-4e1b-ad23-6899439a030d.png" class="w-full h-full object-cover">
            </div>
        </div>

        <!-- Custom Vehicles -->
        <h2 class="text-3xl font-bold text-gray-900 nav-font mb-8 border-l-4 border-wood pl-4">Custom Trucks & Specialties</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-center">
            <div class="bg-white p-4 rounded-xl shadow-lg border border-gray-100">
                <img src="1776913001040_1---13f72e23-f6c2-480a-9b5b-09ef3c41aff0.jpg" class="rounded-lg h-96 w-full object-cover mb-4">
                <h3 class="text-xl font-bold text-suthorn">รถบรรทุกไม้คลาสสิกขัดเงา</h3>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-lg border border-gray-100">
                <img src="1776913000400_1---f267985f-6a5e-45ce-96f3-8ac9f4afe0b2.jpg" class="rounded-lg h-96 w-full object-cover mb-4">
                <h3 class="text-xl font-bold text-suthorn nav-font">พื้นกระบะไม้เนื้อแข็งพิเศษพร้อมงานเคลือบ</h3>
            </div>
        </div>
    </div>

    <!-- FOOTER INJECTED -->
    <div id="footer-container"></div>

    <script src="inline.js"></script>
</body>
</html>
